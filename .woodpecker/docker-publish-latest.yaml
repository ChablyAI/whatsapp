# Pushes linux/amd64 image to GitHub Container Registry (GHCR) as :latest.
#
# Secrets: ghcr_token = PAT with read:packages + write:packages (classic) or fine-grained Packages R/W.
# ghcr_username must be the GitHub USERNAME of the account that owns the PAT — not the org name (e.g. not "chablyai").
# Org with SAML: authorize the PAT for SSO. Org must allow you to publish packages under chablyai/whatsapp.
# Buildx: if the step fails on the agent, mark the repo as Trusted in Woodpecker and uncomment `privileged: true` below.
# Image: ghcr.io/chablyai/whatsapp:latest
#
# Workflow name comes from the filename (e.g. docker-publish-latest), not a root `name` key.

# Only runs on direct pushes to branch `main` (not tags, not pull_request, not other branches).
when:
  event: push
  branch: main

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      # Clone Git submodules (.gitmodules); omit or set false if the repo has no submodules.
      recursive: true

steps:
  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx
    # Uncomment if the agent requires it (Trusted repo + privileged is often needed for plugin-docker-buildx).
    # privileged: true
    # pull: always fetch the latest plugin image tag instead of a stale cached one on the agent.
    pull: true
    settings:
      dockerfile: Dockerfile
      repo: ghcr.io/chablyai/whatsapp
      registry: ghcr.io
      tags:
        - latest
      platforms: linux/amd64
      username:
        from_secret: ghcr_username
      password:
        from_secret: ghcr_token
