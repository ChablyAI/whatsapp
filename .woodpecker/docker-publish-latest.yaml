# Pushes linux/amd64 + linux/arm64 image to GitHub Container Registry (GHCR) as :latest.
#
# Secrets (repository): ghcr_username, ghcr_password (PAT with write:packages, or compatible token)
# Multi-arch buildx: mark this repo as Trusted in Woodpecker (repo Settings), then add `privileged: true` below again.
# Without Trusted + privileged, the Woodpecker linter accepts the file but the build step may fail on the agent.
# Image: ghcr.io/chablyai/whatsapp:latest
#
# Workflow name comes from the filename (e.g. docker-publish-latest), not a root `name` key.

# Only runs on direct pushes to branch `main` (not tags, not pull_request, not other branches).
when:
  event: push
  branch: main

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      # Clone Git submodules (.gitmodules); omit or set false if the repo has no submodules.
      recursive: true

steps:
  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx
    # After enabling Trusted for this repo, uncomment the next line (required for multi-arch buildx on most agents).
    # privileged: true
    # pull: always fetch the latest plugin image tag instead of a stale cached one on the agent.
    pull: true
    settings:
      repo: ghcr.io/chablyai/whatsapp
      dockerfile: Dockerfile
      platforms: linux/amd64,linux/arm64
      tags: latest
      username:
        from_secret: ghcr_username
      password:
        from_secret: ghcr_password
