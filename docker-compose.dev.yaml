# Optional: API + Manager as Docker images (uses services from docker-compose.services.yaml).
# Start deps first, then:
#   docker compose -f docker-compose.services.yaml -f docker-compose.dev.yaml up --build
#
# For day-to-day dev with hot reload, prefer: docker-compose.services.yaml + npm run dev:server + npm run dev:manager

services:
  api:
    container_name: evolution_api
    image: evolution/api:local
    build: .
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      evolution-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - 8080:8080
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net
    env_file:
      - path: .env
        required: false
    expose:
      - 8080

  frontend:
    container_name: evolution_frontend
    image: evolution/manager:local
    build: ./evolution-manager-v2
    restart: always
    ports:
      - "3000:80"
    networks:
      - evolution-net

volumes:
  evolution_instances:

networks:
  evolution-net:
    name: evolution-net
    driver: bridge
