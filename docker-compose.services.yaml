# Local dev dependencies only: Postgres, Redis, RabbitMQ, MinIO, Soketi (Pusher-compatible).
# Run: docker compose -f docker-compose.services.yaml up -d
# Then API: npm run dev:server | Manager: npm run dev:manager (with host ports for DB/Redis)
#
# env_file: .env. For ${VAR} in this file use:
#   docker compose -f docker-compose.services.yaml up -d
#
# Host ports (avoid local conflicts): Postgres 15432, Redis 16379, MinIO API 19000 / console 19001,
#   Soketi (HTTP/WebSocket) 16001 -> container 6001
#
# Soketi: self-hosted Pusher protocol. Default app (override via .env if needed):
#   app id / key / secret must match Evolution Pusher settings; cluster can be any non-empty string
#   when using the pusher npm client with custom host+port (see RDP.md).

services:
  redis:
    container_name: evolution_redis
    image: redis:7-alpine
    restart: always
    command: redis-server --port 6379 --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      - evolution-net
    ports:
      - "127.0.0.1:16379:6379"
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  evolution-postgres:
    container_name: evolution_postgres
    image: postgres:15
    restart: always
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-evolution_api}
      POSTGRES_USER: ${POSTGRES_USERNAME:-evolution}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evolution}
    command:
      - postgres
      - -c
      - max_connections=1000
      - -c
      - listen_addresses=*
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-net
    ports:
      - "127.0.0.1:15432:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    container_name: evolution_rabbitmq
    image: rabbitmq:3-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - evolution-net
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    container_name: evolution_minio
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123456}
    volumes:
      - minio_data:/data
    networks:
      - evolution-net
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"

  soketi:
    container_name: evolution_soketi
    image: quay.io/soketi/soketi:1.6-16-debian
    restart: always
    environment:
      SOKETI_DEBUG: ${SOKETI_DEBUG:-1}
      SOKETI_DEFAULT_APP_ID: ${SOKETI_DEFAULT_APP_ID:-evolution}
      SOKETI_DEFAULT_APP_KEY: ${SOKETI_DEFAULT_APP_KEY:-evolution-key}
      SOKETI_DEFAULT_APP_SECRET: ${SOKETI_DEFAULT_APP_SECRET:-evolution-secret}
    networks:
      - evolution-net
    ports:
      - "127.0.0.1:16001:6001"

volumes:
  evolution_redis:
  postgres_data:
  rabbitmq_data:
  minio_data:

networks:
  evolution-net:
    name: evolution-net
    driver: bridge
